<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarGate Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Intro Screen -->
  <div id="intro-screen" class="screen">
    <h1>Welcome to StarGate Game!</h1>
    <p>Enter Your Username</p>
    <input type="text" id="usernameInput" placeholder="Username" />
    <button id="start-btn">Start Game</button>
    <img src="assets/Stargate1.jpg" alt="Stargate Intro" id="intro-image" />
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen" style="display: none;">
    <h1>StarGate Game</h1>
    <p>
      Use the arrow keys to move the robot, Spacebar to pick up a moonrock, and
      Enter to drop it at the Stargate.
    </p>

    <div id="game-area">
      <!-- Grid Background -->
      <div id="stargate" class="stargate"></div>
      <div id="moonrocks-container"></div>
      <div id="robot" class="robot"></div>

      <!-- Game Over Overlay -->
      <div id="game-over-overlay" class="overlay hidden">
        <h2 id="final-result">GAME OVER</h2>
        <p>Your Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>

    <div id="stats">
      <span id="score">Score: 0</span> |
      <span id="timer">Time: 60s</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
